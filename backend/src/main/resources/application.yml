spring:
  profiles:
    active: dev
  application:
    name: ecommerce-backend

---
# ── Development profile ──────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update          # creates/alters tables automatically in dev
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20   # N+1 prevention

  # JPA auditing (for @CreatedDate / @LastModifiedDate)
  data:
    jpa:
      repositories:
        bootstrap-mode: default

server:
  port: 8080

app:
  jwt:
    # In production replace with a real 256-bit secret stored in env vars
    secret: ${JWT_SECRET:super-secret-key-replace-in-production-at-least-256-bits-long}
    expiration-ms: 86400000   # 24 hours

---
# ── Test profile (H2 in-memory) ───────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
